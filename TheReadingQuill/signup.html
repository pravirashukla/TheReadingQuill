<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – The Reading Quill</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <div class="signup-box">

    <!-- Branding -->
    <h2>Create Account</h2>
    <p>Join a world of readers and writers.</p>

    <form id="signupForm" novalidate>

      <div class="input-box">
        <input type="text" id="name" placeholder="Full Name" required>
        <span>👤</span>
      </div>

      <div class="input-box">
        <input type="email" id="email" placeholder="Email Address" required>
        <span>✉️</span>
      </div>

      <div class="input-box">
        <input type="password" id="createPassword" placeholder="Create Password" required>
        <span class="toggle-pw" data-target="createPassword">👁️</span>
      </div>

      <!-- Strength bar -->
      <div class="strength-wrap">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <span class="strength-label" id="strengthLabel">Strength bar</span>
      </div>

      <div class="input-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <span class="toggle-pw" data-target="confirmPassword">👁️</span>
      </div>
      <p class="field-error" id="matchError"></p>

      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <!-- Divider -->
    <div class="divider"><span>or</span></div>

    <!-- Google login -->
    <button class="google-btn" id="googleSignup">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="18" height="18">
      Continue with Google
    </button>

    <p class="footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script src="signup.js"></script>
</body>
</html>
