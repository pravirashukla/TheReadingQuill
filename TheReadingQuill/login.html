<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login">
   <nav class="navbar">
      <a href="index.html" class="logo">THE READING QUILL</a>
   </nav>

  <div class="login-box">
    <h2>Login</h2>
    <p>Welcome back!</p>

    <form id="loginForm" novalidate>
      <div class="input-box">
        <input type="text" id="username" placeholder="User Name" required>
        <span>👤</span>
        <small class="error-msg" id="usernameError"></small>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password" required>
        <span id="togglePassword">👁️</span>
        <small class="error-msg" id="passwordError"></small>
      </div>

      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
        <a href="forgot-password.html" class="forgot">Forgot Password?</a>
      </div>

      <button type="submit" class="btn nav-btn-style">Login</button>
    </form>

    <div class="divider"><span>or continue with</span></div>

    <div class="social-login">
      <button type="button" class="social-btn google-btn">
        <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.09-1.8 2.73v2.27h2.92c1.7-1.57 2.68-3.88 2.68-6.64z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.27c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.34A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.7A5.4 5.4 0 0 1 3.68 9c0-.59.1-1.17.29-1.7V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.34z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <p class="signup">Don't have an account? <a href="signup.html">Signup</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
